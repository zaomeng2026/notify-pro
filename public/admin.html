<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notify Pro Admin</title>
  <style>
    body { margin: 0; font-family: "Microsoft YaHei", sans-serif; background: #f3f6fb; color: #13253e; }
    .wrap { max-width: 960px; margin: 24px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 6px 24px rgba(20, 50, 90, 0.08); padding: 20px; margin-bottom: 16px; }
    h1, h2 { margin: 0 0 12px; }
    .muted { color: #5f728d; font-size: 13px; }
    .field { display: grid; gap: 6px; margin-bottom: 10px; }
    .field-check { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .field-check input[type="checkbox"] { width: 16px; height: 16px; }
    .grid { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
    input, textarea { border: 1px solid #c8d5e5; border-radius: 8px; padding: 10px; font-size: 14px; }
    textarea { min-height: 80px; resize: vertical; }
    button { border: 0; border-radius: 8px; padding: 10px 14px; cursor: pointer; background: #1f6feb; color: #fff; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .status { font-size: 13px; color: #0d7b3f; }
    .danger { background: #bf2f2f; }
    .conn-row { display: inline-flex; align-items: center; gap: 8px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; box-shadow: 0 0 6px currentColor; }
    .dot.online { color: #18b25f; background: #18b25f; }
    .dot.offline { color: #cf3434; background: #cf3434; }
    .qr-wrap { display: grid; grid-template-columns: 280px 1fr; gap: 12px; align-items: start; }
    .qr-box { border: 1px dashed #9db5d2; border-radius: 8px; min-height: 280px; display: grid; place-items: center; background: #f9fcff; }
    .qr-box img { width: 260px; height: 260px; object-fit: contain; }
    .mono { font-family: Consolas, "Courier New", monospace; font-size: 13px; word-break: break-all; line-height: 1.4; }
    @media (max-width: 900px) { .grid, .qr-wrap { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1 id="h-admin">Admin</h1>
      <div class="muted" id="line-page"></div>
      <div class="muted" id="baseUrlLine"></div>
      <div class="muted conn-row">
        <span id="connDot" class="dot offline"></span>
        <span id="connLine"></span>
      </div>
    </section>

    <section class="card">
      <h2 id="h-store">Store</h2>
      <div class="field"><label id="lb-shop"></label><input id="shopName" /></div>
      <div class="field"><label id="lb-notice"></label><textarea id="notice"></textarea></div>
      <div class="field"><label id="lb-qr-url"></label><input id="qrCodeUrl" /></div>
      <div class="field"><label id="lb-contact"></label><input id="contact" /></div>
      <div class="field-check"><input id="voiceBroadcastEnabled" type="checkbox" /><label id="lb-voice"></label></div>
      <div class="field-check"><input id="showTotalAmount" type="checkbox" /><label id="lb-show-total-amount"></label></div>
      <div class="field-check"><input id="showTodayAmount" type="checkbox" /><label id="lb-show-today-amount"></label></div>
      <div class="field"><label id="lb-accent"></label><input id="accent" placeholder="#1f6feb" /></div>
      <div class="row">
        <button id="saveSettings"></button>
        <span id="settingsStatus" class="status"></span>
      </div>
    </section>

    <section class="card">
      <h2 id="h-phone"></h2>
      <div class="muted" id="line-phone-flow"></div>
      <div class="row" style="margin:10px 0;">
        <button id="newSession"></button>
        <span id="sessionStatus" class="status"></span>
      </div>
      <div class="qr-wrap">
        <div class="qr-box"><img id="qrImage" alt="pairing qr" /></div>
        <div>
          <div class="field"><label id="lb-bind-url"></label><div class="mono" id="bindUrl">-</div></div>
          <div class="field"><label id="lb-bind-state"></label><div class="mono" id="bindState">-</div></div>
          <div class="field"><label id="lb-bind-exp"></label><div class="mono" id="bindExpire">-</div></div>
          <div class="muted" id="line-bind-tip"></div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2 id="h-fallback"></h2>
      <div class="grid">
        <div class="field"><label id="lb-pair-code"></label><input id="pairCode" placeholder="123456" /></div>
        <div class="field"><label id="lb-auth-token"></label><input id="authToken" /></div>
      </div>
      <div class="row">
        <button id="savePairing"></button>
        <span id="pairingStatus" class="status"></span>
      </div>
      <div class="muted" id="devices"></div>
    </section>

    <section class="card">
      <h2 id="h-data"></h2>
      <div class="row">
        <button id="clearRecords" class="danger"></button>
        <span id="clearStatus" class="status"></span>
      </div>
    </section>
  </div>

  <script>
    const I18N = {
      title: "\u6536\u6b3e\u5927\u5c4f\u540e\u53f0",
      page: "\u5c55\u793a\u9875: / | \u5b89\u88c5\u5411\u5bfc: /setup",
      base: "\u7cfb\u7edf\u57fa\u51c6\u5730\u5740: ",
      conn: "\u8fde\u63a5\u72b6\u6001: ",
      online: "\u5728\u7ebf",
      offline: "\u79bb\u7ebf",
      store: "\u5e97\u94fa\u4fe1\u606f",
      shop: "\u5e97\u94fa\u540d\u79f0",
      notice: "\u516c\u544a",
      qrUrl: "\u4e2a\u4eba\u4e8c\u7ef4\u7801\u94fe\u63a5",
      contact: "\u8054\u7cfb\u65b9\u5f0f",
      voice: "\u5f00\u542f\u6536\u6b3e\u8bed\u97f3\u64ad\u62a5",
      showTotalAmount: "\u5927\u5c4f\u663e\u793a\u603b\u91d1\u989d",
      showTodayAmount: "\u5927\u5c4f\u663e\u793a\u4eca\u65e5\u91d1\u989d",
      accent: "\u4e3b\u9898\u8272",
      saveStore: "\u4fdd\u5b58\u5e97\u94fa\u4fe1\u606f",
      phoneBind: "\u624b\u673a\u7ed1\u5b9a\uff08\u63a8\u8350\uff09",
      phoneFlow: "\u751f\u6210\u4e8c\u7ef4\u7801 -> \u624b\u673a\u626b\u7801\u786e\u8ba4 -> Auto.js \u81ea\u52a8\u9886\u53d6\u914d\u7f6e",
      newQr: "\u751f\u6210\u7ed1\u5b9a\u4e8c\u7ef4\u7801",
      bindUrl: "\u7ed1\u5b9a\u94fe\u63a5",
      bindState: "\u4f1a\u8bdd\u72b6\u6001",
      bindExp: "\u8fc7\u671f\u65f6\u95f4",
      bindTip: "\u5237\u65b0\u9875\u9762\u4f1a\u81ea\u52a8\u6062\u590d\u6700\u8fd1\u672a\u5b8c\u6210\u4f1a\u8bdd\uff0c\u4e0d\u4f1a\u4e22\u5931\u3002",
      fallback: "\u517c\u5bb9\u914d\u5bf9\uff08\u65e7\u6d41\u7a0b\uff09",
      pairCode: "\u914d\u5bf9\u7801\uff086\u4f4d\uff09",
      token: "Auth Token\uff08\u53ef\u9009\uff09",
      savePair: "\u4fdd\u5b58\u914d\u5bf9\u914d\u7f6e",
      data: "\u6570\u636e\u7ef4\u62a4",
      clear: "\u6e05\u7a7a\u6536\u6b3e\u8bb0\u5f55",
      noSession: "\u672a\u751f\u6210",
      noDevices: "\u6682\u65e0",
      devicesPrefix: "\u5df2\u7ed1\u5b9a\u8bbe\u5907: ",
      saved: "\u4fdd\u5b58\u6210\u529f",
      saveFailed: "\u4fdd\u5b58\u5931\u8d25",
      createFailed: "\u751f\u6210\u5931\u8d25",
      qrCreated: "\u4e8c\u7ef4\u7801\u5df2\u751f\u6210",
      bindDone: "\u81ea\u52a8\u7ed1\u5b9a\u5b8c\u6210",
      clearConfirm: "\u786e\u8ba4\u6e05\u7a7a\u6240\u6709\u6536\u6b3e\u8bb0\u5f55\uff1f",
      cleared: "\u5df2\u6e05\u7a7a",
      clearFailed: "\u6e05\u7a7a\u5931\u8d25"
    };

    const state = { token: "", timer: null };
    const fmtTime = (ts) => (ts ? new Date(ts).toLocaleString() : "-");
    const $ = (id) => document.getElementById(id);

    const hAdmin = $("h-admin");
    const linePage = $("line-page");
    const baseUrlLine = $("baseUrlLine");
    const connDot = $("connDot");
    const connLine = $("connLine");

    const hStore = $("h-store");
    const lbShop = $("lb-shop");
    const lbNotice = $("lb-notice");
    const lbQrUrl = $("lb-qr-url");
    const lbContact = $("lb-contact");
    const lbAccent = $("lb-accent");
    const shopName = $("shopName");
    const notice = $("notice");
    const qrCodeUrl = $("qrCodeUrl");
    const contact = $("contact");
    const voiceBroadcastEnabled = $("voiceBroadcastEnabled");
    const showTotalAmount = $("showTotalAmount");
    const showTodayAmount = $("showTodayAmount");
    const lbVoice = $("lb-voice");
    const lbShowTotalAmount = $("lb-show-total-amount");
    const lbShowTodayAmount = $("lb-show-today-amount");
    const accent = $("accent");
    const saveSettings = $("saveSettings");
    const settingsStatus = $("settingsStatus");

    const hPhone = $("h-phone");
    const linePhoneFlow = $("line-phone-flow");
    const newSession = $("newSession");
    const sessionStatus = $("sessionStatus");
    const qrImage = $("qrImage");
    const lbBindUrl = $("lb-bind-url");
    const lbBindState = $("lb-bind-state");
    const lbBindExp = $("lb-bind-exp");
    const lineBindTip = $("line-bind-tip");
    const bindUrl = $("bindUrl");
    const bindState = $("bindState");
    const bindExpire = $("bindExpire");

    const hFallback = $("h-fallback");
    const lbPairCode = $("lb-pair-code");
    const pairCode = $("pairCode");
    const lbAuthToken = $("lb-auth-token");
    const authToken = $("authToken");
    const savePairing = $("savePairing");
    const pairingStatus = $("pairingStatus");
    const devices = $("devices");

    const hData = $("h-data");
    const clearRecords = $("clearRecords");
    const clearStatus = $("clearStatus");

    function setTexts() {
      document.title = I18N.title;
      hAdmin.textContent = I18N.title;
      linePage.textContent = I18N.page;
      baseUrlLine.textContent = I18N.base + "-";
      connLine.textContent = I18N.conn + "-";
      connDot.className = "dot offline";

      hStore.textContent = I18N.store;
      lbShop.textContent = I18N.shop;
      lbNotice.textContent = I18N.notice;
      lbQrUrl.textContent = I18N.qrUrl;
      lbContact.textContent = I18N.contact;
      lbVoice.textContent = I18N.voice;
      lbShowTotalAmount.textContent = I18N.showTotalAmount;
      lbShowTodayAmount.textContent = I18N.showTodayAmount;
      voiceBroadcastEnabled.checked = false;
      showTotalAmount.checked = true;
      showTodayAmount.checked = true;
      lbAccent.textContent = I18N.accent;
      saveSettings.textContent = I18N.saveStore;

      hPhone.textContent = I18N.phoneBind;
      linePhoneFlow.textContent = I18N.phoneFlow;
      newSession.textContent = I18N.newQr;
      lbBindUrl.textContent = I18N.bindUrl;
      lbBindState.textContent = I18N.bindState;
      lbBindExp.textContent = I18N.bindExp;
      lineBindTip.textContent = I18N.bindTip;
      bindUrl.textContent = I18N.noSession;

      hFallback.textContent = I18N.fallback;
      lbPairCode.textContent = I18N.pairCode;
      lbAuthToken.textContent = I18N.token;
      savePairing.textContent = I18N.savePair;

      hData.textContent = I18N.data;
      clearRecords.textContent = I18N.clear;
    }

    function applySession(session) {
      if (!session) {
        state.token = "";
        qrImage.removeAttribute("src");
        bindUrl.textContent = I18N.noSession;
        bindState.textContent = "-";
        bindExpire.textContent = "-";
        return;
      }
      state.token = session.token;
      if (session.qrDataUrl) qrImage.src = session.qrDataUrl;
      bindUrl.textContent = session.bindUrl || bindUrl.textContent || "-";
      bindState.textContent = session.status + (session.approvedIp ? ` (${session.approvedIp})` : "");
      bindExpire.textContent = fmtTime(session.expiresAt);
    }

    async function loadSystemInfo() {
      try {
        const r = await fetch("/api/system/info");
        const j = await r.json();
        if (j && j.ok) {
          baseUrlLine.textContent = I18N.base + j.baseUrl;
        }
      } catch (_) {}
    }

    async function loadConnectionStatus() {
      try {
        const r = await fetch("/api/connection/status");
        const j = await r.json();
        if (!(j && j.ok && j.status)) return;
        const s = j.status;
        const on = s.online ? I18N.online : I18N.offline;
        const seen = s.lastSeenText || "-";
        const dev = s.lastDeviceName || "-";
        const ip = s.lastIp || "-";
        connDot.className = "dot " + (s.online ? "online" : "offline");
        connLine.textContent = `${I18N.conn}${on} | ${seen} | ${dev} | ${ip}`;
      } catch (_) {}
    }

    async function loadLatestSession() {
      try {
        const r = await fetch("/api/pairing/session/latest");
        const j = await r.json();
        if (j && j.ok) {
          applySession(j.session);
          if (j.session && (j.session.status === "pending" || j.session.status === "approved")) {
            pollSession();
          }
        }
      } catch (_) {}
    }

    async function loadAll() {
      const [sRes, pRes] = await Promise.all([
        fetch("/api/settings").then((r) => r.json()),
        fetch("/api/pairing/config").then((r) => r.json())
      ]);

      if (sRes.ok && sRes.settings) {
        const s = sRes.settings;
        shopName.value = s.shopName || "";
        notice.value = s.notice || "";
        qrCodeUrl.value = s.qrCodeUrl || "";
        contact.value = s.contact || "";
        const feature = s.feature || {};
        voiceBroadcastEnabled.checked = !!feature.voiceBroadcastEnabled;
        showTotalAmount.checked = feature.showTotalAmount !== false;
        showTodayAmount.checked = feature.showTodayAmount !== false;
        accent.value = (s.theme && s.theme.accent) || "#1f6feb";
      }

      if (pRes.ok && pRes.pairing) {
        pairCode.value = pRes.pairing.code || "";
        authToken.value = pRes.pairing.authToken || "";
        const list = Object.values(pRes.pairing.devices || {});
        devices.textContent = I18N.devicesPrefix + (list.length ? list.map((d) => `${d.deviceName}/${d.platform}`).join(" | ") : I18N.noDevices);
      }
    }

    async function createSession() {
      sessionStatus.textContent = "";
      const r = await fetch("/api/pairing/session", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({})
      });
      const j = await r.json();
      if (!j.ok) {
        sessionStatus.textContent = j.message || I18N.createFailed;
        return;
      }
      applySession(j.session);
      sessionStatus.textContent = I18N.qrCreated;
      pollSession();
    }

    async function pollSession() {
      if (!state.token) return;
      if (state.timer) clearTimeout(state.timer);
      try {
        const r = await fetch("/api/pairing/session/" + encodeURIComponent(state.token));
        const j = await r.json();
        if (j.ok && j.session) {
          applySession(j.session);
          if (j.session.status === "used") {
            sessionStatus.textContent = I18N.bindDone;
            loadAll();
            return;
          }
        }
      } catch (_) {}
      state.timer = setTimeout(pollSession, 2000);
    }

    saveSettings.addEventListener("click", async () => {
      settingsStatus.textContent = "";
      const payload = {
        shopName: shopName.value,
        notice: notice.value,
        qrCodeUrl: qrCodeUrl.value,
        contact: contact.value,
        feature: {
          voiceBroadcastEnabled: !!voiceBroadcastEnabled.checked,
          showTotalAmount: !!showTotalAmount.checked,
          showTodayAmount: !!showTodayAmount.checked
        },
        theme: { accent: accent.value }
      };
      const r = await fetch("/api/settings", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const j = await r.json();
      settingsStatus.textContent = j.ok ? I18N.saved : (j.message || I18N.saveFailed);
    });

    savePairing.addEventListener("click", async () => {
      pairingStatus.textContent = "";
      const payload = { code: pairCode.value, authToken: authToken.value };
      const r = await fetch("/api/pairing/config", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const j = await r.json();
      pairingStatus.textContent = j.ok ? I18N.saved : (j.message || I18N.saveFailed);
      if (j.ok) loadAll();
    });

    clearRecords.addEventListener("click", async () => {
      clearStatus.textContent = "";
      if (!confirm(I18N.clearConfirm)) return;
      const r = await fetch("/api/records", { method: "DELETE" });
      const j = await r.json();
      clearStatus.textContent = j.ok ? I18N.cleared : (j.message || I18N.clearFailed);
    });

    newSession.addEventListener("click", createSession);

    setTexts();
    Promise.all([loadSystemInfo(), loadAll(), loadLatestSession(), loadConnectionStatus()]).catch((err) => alert(err.message));
    setInterval(loadConnectionStatus, 5000);
  </script>
</body>
</html>
