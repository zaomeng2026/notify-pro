name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Android project files
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "Missing ./gradlew. Please push Android project first."
            exit 1
          fi
          if [ ! -d "./app" ]; then
            echo "Missing ./app module. Please push Android project first."
            exit 1
          fi

      - name: Show revision and key source lines
        run: |
          echo "HEAD=$(git rev-parse HEAD)"
          git log -1 --oneline
          echo "---- MainActivity.kt snippet ----"
          sed -n '78,98p' app/src/main/java/com/notifypro/mobile/MainActivity.kt
          echo "---- NotifyListenerService.kt snippet ----"
          sed -n '194,206p' app/src/main/java/com/notifypro/mobile/NotifyListenerService.kt

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build debug
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
