<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>收款大屏后台</title>
  <style>
    body { margin: 0; font-family: "Microsoft YaHei", sans-serif; background: #f3f6fb; color: #13253e; }
    .wrap { max-width: 980px; margin: 24px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 6px 24px rgba(20, 50, 90, 0.08); padding: 20px; margin-bottom: 16px; }
    h1, h2 { margin: 0 0 12px; }
    .muted { color: #5f728d; font-size: 13px; }
    .field { display: grid; gap: 6px; margin-bottom: 10px; }
    .field-check { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .field-check input[type="checkbox"] { width: 16px; height: 16px; }
    .grid { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
    input, textarea { border: 1px solid #c8d5e5; border-radius: 8px; padding: 10px; font-size: 14px; }
    textarea { min-height: 80px; resize: vertical; }
    button { border: 0; border-radius: 8px; padding: 10px 14px; cursor: pointer; background: #1f6feb; color: #fff; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .status { font-size: 13px; color: #0d7b3f; }
    .danger { background: #bf2f2f; }
    .conn-row { display: inline-flex; align-items: center; gap: 8px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; box-shadow: 0 0 6px currentColor; }
    .dot.online { color: #18b25f; background: #18b25f; }
    .dot.offline { color: #cf3434; background: #cf3434; }
    .qr-wrap { display: grid; grid-template-columns: 280px 1fr; gap: 12px; align-items: start; }
    .qr-box { border: 1px dashed #9db5d2; border-radius: 8px; min-height: 280px; display: grid; place-items: center; background: #f9fcff; }
    .qr-box img { width: 260px; height: 260px; object-fit: contain; }
    .mono { font-family: Consolas, "Courier New", monospace; font-size: 13px; word-break: break-all; line-height: 1.4; }
    .preview-box { display: grid; gap: 8px; }
    .preview-img { width: 180px; height: 180px; object-fit: contain; border: 1px dashed #9db5d2; border-radius: 8px; background: #f9fcff; }
    @media (max-width: 900px) { .grid, .qr-wrap { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1 id="h-admin">收款大屏后台</h1>
      <div class="muted" id="line-page"></div>
      <div class="muted" id="baseUrlLine"></div>
      <div class="muted conn-row">
        <span id="connDot" class="dot offline"></span>
        <span id="connLine"></span>
      </div>
      <div class="row" style="margin-top:10px;">
        <button id="openStats" type="button">Open Stats</button>
      </div>
    </section>

    <section class="card">
      <h2 id="h-store">店铺信息</h2>
      <div class="field"><label id="lb-shop"></label><input id="shopName" /></div>
      <div class="field"><label id="lb-notice"></label><textarea id="notice"></textarea></div>
      <div class="field"><label id="lb-contact"></label><input id="contact" /></div>
      <div class="field"><label id="lb-admin-password"></label><input id="adminPassword" type="password" placeholder="留空不修改" /></div>
      <div class="field"><label id="lb-backup-keep"></label><input id="backupKeep" type="number" min="3" max="365" step="1" /></div>
      <div class="field"><label id="lb-backup-hour"></label><input id="autoDailyBackupHour" type="number" min="0" max="23" step="1" /></div>

      <div class="grid">
        <div class="field preview-box">
          <label id="lb-wechat-qr"></label>
          <input id="wechatQrFile" type="file" accept="image/*" />
          <img id="wechatQrPreview" class="preview-img" alt="wechat qr preview" />
          <button id="clearWechatQr" type="button">清除微信收款码</button>
        </div>
        <div class="field preview-box">
          <label id="lb-alipay-qr"></label>
          <input id="alipayQrFile" type="file" accept="image/*" />
          <img id="alipayQrPreview" class="preview-img" alt="alipay qr preview" />
          <button id="clearAlipayQr" type="button">清除支付宝收款码</button>
        </div>
      </div>

      <div class="field-check"><input id="showPaymentQrcodes" type="checkbox" /><label id="lb-show-qrs"></label></div>
      <div class="field-check"><input id="showBrand" type="checkbox" /><label id="lb-show-brand"></label></div>
      <div class="field-check"><input id="showNotice" type="checkbox" /><label id="lb-show-notice"></label></div>
      <div class="field-check"><input id="showContact" type="checkbox" /><label id="lb-show-contact"></label></div>
      <div class="field-check"><input id="voiceBroadcastEnabled" type="checkbox" /><label id="lb-voice"></label></div>
      <div class="field-check"><input id="showTotalCount" type="checkbox" /><label id="lb-show-total-count"></label></div>
      <div class="field-check"><input id="showTotalAmount" type="checkbox" /><label id="lb-show-total-amount"></label></div>
      <div class="field-check"><input id="showTodayCount" type="checkbox" /><label id="lb-show-today-count"></label></div>
      <div class="field-check"><input id="showTodayAmount" type="checkbox" /><label id="lb-show-today-amount"></label></div>
      <div class="field-check"><input id="showWechatQrcode" type="checkbox" /><label id="lb-show-wechat-qr"></label></div>
      <div class="field-check"><input id="showAlipayQrcode" type="checkbox" /><label id="lb-show-alipay-qr"></label></div>
      <div class="field-check"><input id="showRecordsTable" type="checkbox" /><label id="lb-show-records-table"></label></div>
      <div class="field-check"><input id="showFooterActions" type="checkbox" /><label id="lb-show-footer-actions"></label></div>
      <div class="field"><label id="lb-accent"></label><input id="accent" placeholder="#1f6feb" /></div>
      <div class="row">
        <button id="saveSettings"></button>
        <span id="settingsStatus" class="status"></span>
      </div>
    </section>

    <section class="card">
      <h2 id="h-phone"></h2>
      <div class="muted" id="line-phone-flow"></div>
      <div class="row" style="margin:10px 0;">
        <button id="newSession"></button>
        <span id="sessionStatus" class="status"></span>
      </div>
      <div class="qr-wrap">
        <div class="qr-box"><img id="qrImage" alt="pairing qr" /></div>
        <div>
          <div class="field"><label id="lb-bind-url"></label><div class="mono" id="bindUrl">-</div></div>
          <div class="field"><label id="lb-bind-state"></label><div class="mono" id="bindState">-</div></div>
          <div class="field"><label id="lb-bind-exp"></label><div class="mono" id="bindExpire">-</div></div>
          <div class="muted" id="line-bind-tip"></div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2 id="h-data"></h2>
      <div class="row">
        <button id="clearRecords" class="danger"></button>
        <span id="clearStatus" class="status"></span>
      </div>
    </section>
  </div>

  <script>
    const I18N = {
      title: "收款大屏后台",
      page: "展示页: / | 安装向导: /setup",
      base: "系统基准地址: ",
      conn: "连接状态: ",
      online: "在线",
      offline: "离线",
      store: "店铺信息",
      shop: "店铺名称",
      notice: "公告",
      contact: "联系方式",
      wechatQr: "微信收款码（可直接上传图片）",
      alipayQr: "支付宝收款码（可直接上传图片）",
      showQrs: "大屏显示支付二维码",
      showContact: "大屏显示联系方式",
      voice: "开启收款语音播报",
      showTotalAmount: "大屏显示总金额",
      showTodayAmount: "大屏显示今日金额",
      accent: "主题色",
      saveStore: "保存店铺信息",
      phoneBind: "手机绑定（推荐）",
      phoneFlow: "生成二维码 -> 手机扫码确认 -> 手机端自动领取配置",
      newQr: "生成绑定二维码",
      bindUrl: "绑定链接",
      bindState: "会话状态",
      bindExp: "过期时间",
      bindTip: "刷新页面会自动恢复最近未完成会话，不会丢失。",
      data: "数据维护",
      clear: "清空收款记录",
      noSession: "未生成",
      saved: "保存成功",
      saveFailed: "保存失败",
      createFailed: "生成失败",
      qrCreated: "二维码已生成",
      bindDone: "自动绑定完成",
      clearConfirm: "确认清空所有收款记录？",
      cleared: "已清空",
      clearFailed: "清空失败",
      imgTooLarge: "图片太大，请选择 2MB 以内图片",
      imgReadFailed: "读取图片失败"
    };

    const state = {
      token: "",
      timer: null,
      wechatQrCodeUrl: "",
      alipayQrCodeUrl: "",
      adminAuthPassword: sessionStorage.getItem("notify_pro_admin_pwd") || "",
      autoSessionCreating: false
    };

    const fmtTime = (ts) => (ts ? new Date(ts).toLocaleString() : "-");
    const $ = (id) => document.getElementById(id);
    const rootWrap = document.querySelector(".wrap");

    const hAdmin = $("h-admin");
    const linePage = $("line-page");
    const baseUrlLine = $("baseUrlLine");
    const connDot = $("connDot");
    const connLine = $("connLine");
    const openStats = $("openStats");

    const hStore = $("h-store");
    const lbShop = $("lb-shop");
    const lbNotice = $("lb-notice");
    const lbContact = $("lb-contact");
    const lbAdminPassword = $("lb-admin-password");
    const lbBackupKeep = $("lb-backup-keep");
    const lbBackupHour = $("lb-backup-hour");
    const lbWechatQr = $("lb-wechat-qr");
    const lbAlipayQr = $("lb-alipay-qr");
    const lbShowQrs = $("lb-show-qrs");
    const lbShowBrand = $("lb-show-brand");
    const lbShowNotice = $("lb-show-notice");
    const lbAccent = $("lb-accent");
    const shopName = $("shopName");
    const notice = $("notice");
    const contact = $("contact");
    const adminPassword = $("adminPassword");
    const backupKeep = $("backupKeep");
    const autoDailyBackupHour = $("autoDailyBackupHour");
    const showPaymentQrcodes = $("showPaymentQrcodes");
    const showBrand = $("showBrand");
    const showNotice = $("showNotice");
    const showContact = $("showContact");
    const voiceBroadcastEnabled = $("voiceBroadcastEnabled");
    const showTotalCount = $("showTotalCount");
    const showTotalAmount = $("showTotalAmount");
    const showTodayCount = $("showTodayCount");
    const showTodayAmount = $("showTodayAmount");
    const showWechatQrcode = $("showWechatQrcode");
    const showAlipayQrcode = $("showAlipayQrcode");
    const showRecordsTable = $("showRecordsTable");
    const showFooterActions = $("showFooterActions");
    const lbShowContact = $("lb-show-contact");
    const lbVoice = $("lb-voice");
    const lbShowTotalCount = $("lb-show-total-count");
    const lbShowTotalAmount = $("lb-show-total-amount");
    const lbShowTodayCount = $("lb-show-today-count");
    const lbShowTodayAmount = $("lb-show-today-amount");
    const lbShowWechatQr = $("lb-show-wechat-qr");
    const lbShowAlipayQr = $("lb-show-alipay-qr");
    const lbShowRecordsTable = $("lb-show-records-table");
    const lbShowFooterActions = $("lb-show-footer-actions");
    const accent = $("accent");
    const saveSettings = $("saveSettings");
    const settingsStatus = $("settingsStatus");
    const wechatQrFile = $("wechatQrFile");
    const alipayQrFile = $("alipayQrFile");
    const wechatQrPreview = $("wechatQrPreview");
    const alipayQrPreview = $("alipayQrPreview");
    const clearWechatQr = $("clearWechatQr");
    const clearAlipayQr = $("clearAlipayQr");

    const hPhone = $("h-phone");
    const linePhoneFlow = $("line-phone-flow");
    const newSession = $("newSession");
    const sessionStatus = $("sessionStatus");
    const qrImage = $("qrImage");
    const lbBindUrl = $("lb-bind-url");
    const lbBindState = $("lb-bind-state");
    const lbBindExp = $("lb-bind-exp");
    const lineBindTip = $("line-bind-tip");
    const bindUrl = $("bindUrl");
    const bindState = $("bindState");
    const bindExpire = $("bindExpire");

    const hData = $("h-data");
    const clearRecords = $("clearRecords");
    const clearStatus = $("clearStatus");

    function setTexts() {
      document.title = I18N.title;
      hAdmin.textContent = I18N.title;
      linePage.textContent = "显示页: / | 安装向导: /setup | 完整统计: /stats";
      baseUrlLine.textContent = I18N.base + "-";
      connLine.textContent = I18N.conn + "-";
      connDot.className = "dot offline";
      openStats.textContent = "打开完整统计";

      hStore.textContent = I18N.store;
      lbShop.textContent = I18N.shop;
      lbNotice.textContent = I18N.notice;
      lbContact.textContent = I18N.contact;
      lbAdminPassword.textContent = "后台进入密码（留空不修改）";
      lbBackupKeep.textContent = "备份保留份数（3-365）";
      lbBackupHour.textContent = "自动备份时间（0-23 点）";
      lbWechatQr.textContent = I18N.wechatQr;
      lbAlipayQr.textContent = I18N.alipayQr;
      lbShowQrs.textContent = I18N.showQrs;
      lbShowBrand.textContent = "\u5927\u5c4f\u663e\u793a\u5e97\u94fa\u6807\u9898";
      lbShowNotice.textContent = "\u5927\u5c4f\u663e\u793a\u516c\u544a\u5361\u7247";
      lbShowContact.textContent = I18N.showContact;
      lbVoice.textContent = I18N.voice;
      lbShowTotalCount.textContent = "\u5927\u5c4f\u663e\u793a\u603b\u7b14\u6570";
      lbShowTotalAmount.textContent = I18N.showTotalAmount;
      lbShowTodayCount.textContent = "\u5927\u5c4f\u663e\u793a\u4eca\u65e5\u7b14\u6570";
      lbShowTodayAmount.textContent = I18N.showTodayAmount;
      lbShowWechatQr.textContent = "\u5927\u5c4f\u663e\u793a\u5fae\u4fe1\u6536\u6b3e\u7801";
      lbShowAlipayQr.textContent = "\u5927\u5c4f\u663e\u793a\u652f\u4ed8\u5b9d\u6536\u6b3e\u7801";
      lbShowRecordsTable.textContent = "\u5927\u5c4f\u663e\u793a\u6536\u6b3e\u660e\u7ec6\u8868";
      lbShowFooterActions.textContent = "\u5927\u5c4f\u663e\u793a\u5206\u9875\u6309\u94ae";
      lbAccent.textContent = I18N.accent;
      saveSettings.textContent = I18N.saveStore;
      showPaymentQrcodes.checked = true;
      showBrand.checked = true;
      showNotice.checked = true;
      showContact.checked = true;
      voiceBroadcastEnabled.checked = false;
      showTotalCount.checked = true;
      showTotalAmount.checked = true;
      showTodayCount.checked = true;
      showTodayAmount.checked = true;
      showWechatQrcode.checked = true;
      showAlipayQrcode.checked = true;
      showRecordsTable.checked = true;
      showFooterActions.checked = true;
      backupKeep.value = "30";
      autoDailyBackupHour.value = "4";

      hPhone.textContent = I18N.phoneBind;
      linePhoneFlow.textContent = I18N.phoneFlow;
      newSession.textContent = I18N.newQr;
      lbBindUrl.textContent = I18N.bindUrl;
      lbBindState.textContent = I18N.bindState;
      lbBindExp.textContent = I18N.bindExp;
      lineBindTip.textContent = I18N.bindTip;
      bindUrl.textContent = I18N.noSession;

      hData.textContent = I18N.data;
      clearRecords.textContent = I18N.clear;

      renderQrPreview("wechat", "");
      renderQrPreview("alipay", "");
    }

    function applySession(session) {
      if (!session) {
        state.token = "";
        qrImage.removeAttribute("src");
        bindUrl.textContent = I18N.noSession;
        bindState.textContent = "-";
        bindExpire.textContent = "-";
        return;
      }
      state.token = session.token;
      if (session.qrDataUrl) qrImage.src = session.qrDataUrl;
      bindUrl.textContent = session.bindUrl || bindUrl.textContent || "-";
      bindState.textContent = session.status + (session.approvedIp ? ` (${session.approvedIp})` : "");
      bindExpire.textContent = fmtTime(session.expiresAt);
    }

    async function verifyAdminPassword(pwd) {
      const r = await fetch("/api/admin/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: pwd || "" })
      });
      if (!r.ok) return false;
      const j = await r.json();
      return !!(j && j.ok && j.verified !== false);
    }

    async function ensureAdminPasswordReady(forcePrompt) {
      const statusRes = await fetch("/api/admin/auth-status");
      const status = await statusRes.json();
      if (!(status && status.ok && status.required)) {
        state.adminAuthPassword = "";
        sessionStorage.removeItem("notify_pro_admin_pwd");
        return true;
      }

      let pwd = "";
      if (!forcePrompt) {
        pwd = state.adminAuthPassword || sessionStorage.getItem("notify_pro_admin_pwd") || "";
      }
      if (!pwd) {
        pwd = String(prompt("请输入后台访问密码") || "").trim();
      }
      if (!pwd) return false;

      const ok = await verifyAdminPassword(pwd);
      if (!ok) {
        alert("后台密码错误");
        state.adminAuthPassword = "";
        sessionStorage.removeItem("notify_pro_admin_pwd");
        return false;
      }
      state.adminAuthPassword = pwd;
      sessionStorage.setItem("notify_pro_admin_pwd", pwd);
      return true;
    }

    async function fetchWithAdmin(url, options) {
      const authOk = await ensureAdminPasswordReady(false);
      if (!authOk) {
        throw new Error("admin password required");
      }
      const opt = Object.assign({}, options || {});
      const headers = Object.assign({}, opt.headers || {});
      if (state.adminAuthPassword) {
        headers["X-Admin-Password"] = state.adminAuthPassword;
      }
      opt.headers = headers;

      let r = await fetch(url, opt);
      if (r.status !== 401) return r;

      const retryAuth = await ensureAdminPasswordReady(true);
      if (!retryAuth) return r;
      opt.headers = Object.assign({}, headers, { "X-Admin-Password": state.adminAuthPassword });
      return fetch(url, opt);
    }

    async function loadSystemInfo() {
      try {
        const r = await fetch("/api/system/info");
        const j = await r.json();
        if (j && j.ok) {
          const rev = j.serverRevision ? ` | rev: ${j.serverRevision}` : "";
          baseUrlLine.textContent = I18N.base + j.baseUrl + rev;
          if (!("settingsSchemaVersion" in j) || Number(j.settingsSchemaVersion || 0) < 3) {
            settingsStatus.textContent = "警告：当前运行的服务端版本过旧，模块开关可能无法保存。请关闭所有 node.exe 后重新启动。";
          }
        }
      } catch (_) {}
    }

    async function loadConnectionStatus() {
      try {
        const r = await fetch("/api/connection/status");
        const j = await r.json();
        if (!(j && j.ok && j.status)) return;
        const s = j.status;
        const on = s.online ? I18N.online : I18N.offline;
        const seen = s.lastSeenText || "-";
        const dev = s.lastDeviceName || "-";
        const ip = s.lastIp || "-";
        connDot.className = "dot " + (s.online ? "online" : "offline");
        connLine.textContent = `${I18N.conn}${on} | ${seen} | ${dev} | ${ip}`;
      } catch (_) {}
    }

    async function loadLatestSession() {
      try {
        const r = await fetchWithAdmin("/api/pairing/session/latest");
        const j = await r.json();
        if (j && j.ok) {
          applySession(j.session);
          if (j.session && (j.session.status === "pending" || j.session.status === "approved")) pollSession();
          return j.session || null;
        }
      } catch (_) {}
      return null;
    }

    function isAwaitingSession(session) {
      return !!session && (session.status === "pending" || session.status === "approved");
    }

    async function ensureAutoPairingSession() {
      const latest = await loadLatestSession();
      if (isAwaitingSession(latest)) return latest;
      if (state.autoSessionCreating) return null;
      state.autoSessionCreating = true;
      try {
        await createSession(true);
      } finally {
        state.autoSessionCreating = false;
      }
      return null;
    }

    async function loadAll() {
      const sRes = await fetch("/api/settings").then((r) => r.json());

      if (sRes.ok && sRes.settings) {
        const s = sRes.settings;
        if (Number(sRes.schemaVersion || 0) < 3) {
          settingsStatus.textContent = "警告：服务端配置版本过旧，请重启最新服务后再保存模块开关。";
        }
        shopName.value = s.shopName || "";
        notice.value = s.notice || "";
        contact.value = s.contact || "";
        backupKeep.value = String(Number(s.backupKeep == null ? 30 : s.backupKeep));
        autoDailyBackupHour.value = String(Number(s.autoDailyBackupHour == null ? 4 : s.autoDailyBackupHour));
        const feature = s.feature || {};
        const requiredFeatureKeys = [
          "showBrand",
          "showNotice",
          "showTotalCount",
          "showTodayCount",
          "showWechatQrcode",
          "showAlipayQrcode",
          "showRecordsTable",
          "showFooterActions"
        ];
        const missingFeatureKeys = requiredFeatureKeys.filter((k) => !(k in feature));
        if (missingFeatureKeys.length) {
          settingsStatus.textContent = "警告：服务端配置结构仍是旧版，请完全重启服务后再保存模块开关。";
        }
        showPaymentQrcodes.checked = feature.showPaymentQrcodes !== false;
        showBrand.checked = feature.showBrand !== false;
        showNotice.checked = feature.showNotice !== false;
        showContact.checked = feature.showContact !== false;
        voiceBroadcastEnabled.checked = !!feature.voiceBroadcastEnabled;
        showTotalCount.checked = feature.showTotalCount !== false;
        showTotalAmount.checked = feature.showTotalAmount !== false;
        showTodayCount.checked = feature.showTodayCount !== false;
        showTodayAmount.checked = feature.showTodayAmount !== false;
        showWechatQrcode.checked = feature.showWechatQrcode !== false;
        showAlipayQrcode.checked = feature.showAlipayQrcode !== false;
        showRecordsTable.checked = feature.showRecordsTable !== false;
        showFooterActions.checked = feature.showFooterActions !== false;
        accent.value = (s.theme && s.theme.accent) || "#1f6feb";

        state.wechatQrCodeUrl = s.wechatQrCodeUrl || "";
        state.alipayQrCodeUrl = s.alipayQrCodeUrl || "";
        renderQrPreview("wechat", state.wechatQrCodeUrl);
        renderQrPreview("alipay", state.alipayQrCodeUrl);
      }

    }

    async function createSession(isAuto) {
      sessionStatus.textContent = "";
      const r = await fetchWithAdmin("/api/pairing/session", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({})
      });
      const j = await r.json();
      if (!j.ok) {
        sessionStatus.textContent = j.message || I18N.createFailed;
        return;
      }
      applySession(j.session);
      sessionStatus.textContent = isAuto ? (I18N.qrCreated + " (auto)") : I18N.qrCreated;
      pollSession();
    }

    async function pollSession() {
      if (!state.token) return;
      if (state.timer) clearTimeout(state.timer);
      try {
        const r = await fetchWithAdmin("/api/pairing/session/" + encodeURIComponent(state.token));
        const j = await r.json();
        if (j.ok && j.session) {
          applySession(j.session);
          if (j.session.status === "used") {
            sessionStatus.textContent = I18N.bindDone;
            loadAll();
            return;
          }
        }
      } catch (_) {}
      state.timer = setTimeout(pollSession, 2000);
    }

    function renderQrPreview(type, src) {
      const img = type === "wechat" ? wechatQrPreview : alipayQrPreview;
      if (!src) {
        img.removeAttribute("src");
        img.style.display = "none";
        return;
      }
      img.src = src;
      img.style.display = "block";
    }

    function readImageAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        if (!file) return resolve("");
        if (file.size > 2 * 1024 * 1024) {
          reject(new Error(I18N.imgTooLarge));
          return;
        }
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(new Error(I18N.imgReadFailed));
        reader.readAsDataURL(file);
      });
    }

    async function handleQrFile(type, file) {
      try {
        const dataUrl = await readImageAsDataUrl(file);
        if (!dataUrl) return;
        if (type === "wechat") state.wechatQrCodeUrl = dataUrl;
        if (type === "alipay") state.alipayQrCodeUrl = dataUrl;
        renderQrPreview(type, dataUrl);
        settingsStatus.textContent = "图片已载入，点击“保存店铺信息”生效";
      } catch (e) {
        settingsStatus.textContent = e.message || I18N.imgReadFailed;
      }
    }

    saveSettings.addEventListener("click", async () => {
      settingsStatus.textContent = "";
      if (state.wechatQrCodeUrl && state.alipayQrCodeUrl && state.wechatQrCodeUrl === state.alipayQrCodeUrl) {
        settingsStatus.textContent = "提醒：微信码和支付宝码当前是同一张图片";
      }
      const payload = {
        shopName: shopName.value,
        notice: notice.value,
        contact: contact.value,
        backupKeep: Math.max(3, Math.min(365, Number(backupKeep.value || 30) || 30)),
        autoDailyBackupHour: Math.max(0, Math.min(23, Number(autoDailyBackupHour.value || 4) || 4)),
        wechatQrCodeUrl: state.wechatQrCodeUrl || "",
        alipayQrCodeUrl: state.alipayQrCodeUrl || "",
        feature: {
          showPaymentQrcodes: !!showPaymentQrcodes.checked,
          showBrand: !!showBrand.checked,
          showNotice: !!showNotice.checked,
          showContact: !!showContact.checked,
          voiceBroadcastEnabled: !!voiceBroadcastEnabled.checked,
          showTotalCount: !!showTotalCount.checked,
          showTotalAmount: !!showTotalAmount.checked,
          showTodayCount: !!showTodayCount.checked,
          showTodayAmount: !!showTodayAmount.checked,
          showWechatQrcode: !!showWechatQrcode.checked,
          showAlipayQrcode: !!showAlipayQrcode.checked,
          showRecordsTable: !!showRecordsTable.checked,
          showFooterActions: !!showFooterActions.checked
        },
        theme: { accent: accent.value }
      };
      const newAdminPassword = String(adminPassword.value || "").trim();
      if (newAdminPassword) payload.adminPassword = newAdminPassword;
      const r = await fetchWithAdmin("/api/settings", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const j = await r.json();
      settingsStatus.textContent = j.ok ? I18N.saved : (j.message || I18N.saveFailed);
      if (j.ok) {
        const persisted = (j.settings && j.settings.feature) || {};
        const mismatch = Object.keys(payload.feature).filter((k) => persisted[k] !== payload.feature[k]);
        if (mismatch.length) {
          settingsStatus.textContent = `保存异常：${mismatch.join(", ")} 未生效。请确认当前服务已升级并重启后再试。`;
          return;
        }
        if (newAdminPassword) {
          state.adminAuthPassword = newAdminPassword;
          sessionStorage.setItem("notify_pro_admin_pwd", newAdminPassword);
          adminPassword.value = "";
        }
        loadAll();
      }
    });

    wechatQrFile.addEventListener("change", (e) => handleQrFile("wechat", e.target.files && e.target.files[0]));
    alipayQrFile.addEventListener("change", (e) => handleQrFile("alipay", e.target.files && e.target.files[0]));

    clearWechatQr.addEventListener("click", () => {
      state.wechatQrCodeUrl = "";
      wechatQrFile.value = "";
      renderQrPreview("wechat", "");
      settingsStatus.textContent = "已清除微信收款码，点击“保存店铺信息”生效";
    });

    clearAlipayQr.addEventListener("click", () => {
      state.alipayQrCodeUrl = "";
      alipayQrFile.value = "";
      renderQrPreview("alipay", "");
      settingsStatus.textContent = "已清除支付宝收款码，点击“保存店铺信息”生效";
    });

    clearRecords.addEventListener("click", async () => {
      clearStatus.textContent = "";
      if (!confirm(I18N.clearConfirm)) return;
      const r = await fetchWithAdmin("/api/records", { method: "DELETE" });
      const j = await r.json();
      clearStatus.textContent = j.ok ? I18N.cleared : (j.message || I18N.clearFailed);
    });

    newSession.addEventListener("click", () => createSession(false));
    openStats.addEventListener("click", () => { window.open("/stats", "_blank"); });

    if (rootWrap) rootWrap.style.display = "none";
    setTexts();
    ensureAdminPasswordReady(false)
      .then((ok) => {
        if (!ok) throw new Error("需要输入后台密码");
        if (rootWrap) rootWrap.style.display = "";
        return Promise.all([loadSystemInfo(), loadAll(), ensureAutoPairingSession(), loadConnectionStatus()]);
      })
      .catch((err) => alert(err.message));
    setInterval(loadConnectionStatus, 5000);
  </script>
</body>
</html>
