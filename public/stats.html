<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>完整统计数据</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --line: #d5deea;
      --text: #11243b;
      --muted: #5f728d;
      --accent: #1f6feb;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1320px; margin: 18px auto; padding: 0 14px; }
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 4px 18px rgba(16, 36, 60, 0.06);
      margin-bottom: 12px;
    }
    .muted { color: var(--muted); font-size: 13px; }
    .kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .kpi {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fafcff;
    }
    .kpi .label { color: var(--muted); font-size: 13px; }
    .kpi .value { margin-top: 6px; font-size: 28px; font-weight: 700; color: #0e3158; }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    h2 { margin: 0 0 10px; font-size: 18px; }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      border: 1px solid #dbe4f0;
      padding: 8px;
      text-align: center;
      font-size: 14px;
    }
    th {
      background: #eef5ff;
      color: #17365c;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .table-wrap { max-height: 420px; overflow: auto; }
    .btn {
      border: 0;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }
    input[type="number"] {
      border: 1px solid #c8d5e5;
      border-radius: 8px;
      padding: 8px;
      width: 110px;
    }
    @media (max-width: 980px) {
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="toolbar">
      <button class="btn" id="backAdmin">返回后台</button>
      <label>统计天数：</label>
      <input id="days" type="number" min="7" max="3650" value="180" />
      <button class="btn" id="reload">刷新统计</button>
      <span class="muted" id="generatedAt">-</span>
    </div>

    <section class="card">
      <div class="kpis">
        <div class="kpi"><div class="label">总笔数</div><div class="value" id="totalCount">0</div></div>
        <div class="kpi"><div class="label">总金额(元)</div><div class="value" id="totalAmount">0</div></div>
        <div class="kpi"><div class="label">微信笔数/金额</div><div class="value" id="wechatSummary">0 / 0</div></div>
        <div class="kpi"><div class="label">支付宝笔数/金额</div><div class="value" id="alipaySummary">0 / 0</div></div>
      </div>
    </section>

    <div class="grid-2">
      <section class="card">
        <h2>按日统计</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th>总笔数</th>
                <th>总金额</th>
                <th>微信</th>
                <th>支付宝</th>
                <th>其他</th>
              </tr>
            </thead>
            <tbody id="dailyTbody"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <h2>按月统计</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>月份</th>
                <th>总笔数</th>
                <th>总金额</th>
              </tr>
            </thead>
            <tbody id="monthlyTbody"></tbody>
          </table>
        </div>
      </section>
    </div>

    <div class="grid-2">
      <section class="card">
        <h2>今日小时分布</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>小时</th>
                <th>笔数</th>
                <th>金额</th>
              </tr>
            </thead>
            <tbody id="hourlyTbody"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <h2>大额记录 Top20</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>渠道</th>
                <th>金额</th>
                <th>ID</th>
              </tr>
            </thead>
            <tbody id="topTbody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <script>
    function $(id) { return document.getElementById(id); }
    const state = {
      adminPwd: sessionStorage.getItem("notify_pro_admin_pwd") || ""
    };
    function money(v) {
      const n = Number(v || 0);
      if (!Number.isFinite(n)) return "0";
      return n.toFixed(2).replace(/\.00$/, "");
    }
    function channelName(c) {
      if (c === "wechat") return "微信";
      if (c === "alipay") return "支付宝";
      return "其他";
    }
    function escapeHtml(s) {
      return String(s == null ? "" : s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderEmpty(tbodyId, col) {
      $(tbodyId).innerHTML = `<tr><td colspan="${col}">暂无数据</td></tr>`;
    }

    function renderStats(stats) {
      $("totalCount").textContent = String(stats.totalCount || 0);
      $("totalAmount").textContent = money(stats.totalAmount || 0);
      const wc = stats.channelSummary && stats.channelSummary.wechat ? stats.channelSummary.wechat : { count: 0, amount: 0 };
      const ac = stats.channelSummary && stats.channelSummary.alipay ? stats.channelSummary.alipay : { count: 0, amount: 0 };
      $("wechatSummary").textContent = `${wc.count || 0} / ${money(wc.amount || 0)}`;
      $("alipaySummary").textContent = `${ac.count || 0} / ${money(ac.amount || 0)}`;
      $("generatedAt").textContent = "生成时间: " + new Date(Number(stats.generatedAt || Date.now())).toLocaleString();

      const daily = Array.isArray(stats.daily) ? stats.daily : [];
      if (!daily.length) renderEmpty("dailyTbody", 6);
      else {
        $("dailyTbody").innerHTML = daily.map((d) => `
          <tr>
            <td>${escapeHtml(d.date)}</td>
            <td>${d.count || 0}</td>
            <td>${money(d.amount || 0)}</td>
            <td>${d.wechatCount || 0}</td>
            <td>${d.alipayCount || 0}</td>
            <td>${d.otherCount || 0}</td>
          </tr>
        `).join("");
      }

      const monthly = Array.isArray(stats.monthly) ? stats.monthly : [];
      if (!monthly.length) renderEmpty("monthlyTbody", 3);
      else {
        $("monthlyTbody").innerHTML = monthly.map((m) => `
          <tr>
            <td>${escapeHtml(m.month)}</td>
            <td>${m.count || 0}</td>
            <td>${money(m.amount || 0)}</td>
          </tr>
        `).join("");
      }

      const hourly = Array.isArray(stats.todayHourly) ? stats.todayHourly : [];
      if (!hourly.length) renderEmpty("hourlyTbody", 3);
      else {
        $("hourlyTbody").innerHTML = hourly.map((h) => `
          <tr>
            <td>${String(h.hour).padStart(2, "0")}:00</td>
            <td>${h.count || 0}</td>
            <td>${money(h.amount || 0)}</td>
          </tr>
        `).join("");
      }

      const top = Array.isArray(stats.topAmountRecords) ? stats.topAmountRecords : [];
      if (!top.length) renderEmpty("topTbody", 4);
      else {
        $("topTbody").innerHTML = top.map((r) => `
          <tr>
            <td>${escapeHtml(r.time || "")}</td>
            <td>${channelName(r.channel)}</td>
            <td>${money(r.amount || 0)}</td>
            <td>${escapeHtml(r.id || "")}</td>
          </tr>
        `).join("");
      }
    }

    async function ensureAdminPasswordReady(forcePrompt) {
      const statusRes = await fetch("/api/admin/auth-status");
      const status = await statusRes.json();
      if (!(status && status.ok && status.required)) {
        state.adminPwd = "";
        sessionStorage.removeItem("notify_pro_admin_pwd");
        return true;
      }
      let pwd = "";
      if (!forcePrompt) pwd = state.adminPwd || sessionStorage.getItem("notify_pro_admin_pwd") || "";
      if (!pwd) pwd = String(prompt("请输入后台访问密码") || "").trim();
      if (!pwd) return false;
      const r = await fetch("/api/admin/verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: pwd })
      });
      if (!r.ok) {
        alert("后台密码错误");
        return false;
      }
      state.adminPwd = pwd;
      sessionStorage.setItem("notify_pro_admin_pwd", pwd);
      return true;
    }

    async function fetchWithAdmin(url) {
      const ready = await ensureAdminPasswordReady(false);
      if (!ready) throw new Error("需要后台密码");
      const headers = state.adminPwd ? { "X-Admin-Password": state.adminPwd } : {};
      let r = await fetch(url, { headers });
      if (r.status !== 401) return r;
      const retry = await ensureAdminPasswordReady(true);
      if (!retry) return r;
      return fetch(url, { headers: { "X-Admin-Password": state.adminPwd } });
    }

    async function loadStats() {
      const days = Math.max(7, Math.min(3650, Number($("days").value || 180)));
      $("days").value = String(days);
      const r = await fetchWithAdmin(`/api/stats/full?days=${days}`);
      const j = await r.json();
      if (!j || !j.ok || !j.stats) {
        throw new Error("统计接口返回异常");
      }
      renderStats(j.stats);
    }

    $("reload").addEventListener("click", () => { loadStats().catch((e) => alert(e.message)); });
    $("backAdmin").addEventListener("click", () => { location.href = "/admin"; });

    loadStats().catch((e) => alert(e.message));
  </script>
</body>
</html>
